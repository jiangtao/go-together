name: roadmap-quality

on:
  pull_request:
    paths:
      - "roadmap/**"
      - "docs/go-learning/daily-lessons/day-*.md"
      - ".github/workflows/roadmap-*.yml"
      - ".vercelignore"
  push:
    branches: [main]
    paths:
      - "roadmap/**"
      - "docs/go-learning/daily-lessons/day-*.md"
      - ".github/workflows/roadmap-*.yml"
      - ".vercelignore"

permissions:
  contents: read

concurrency:
  group: roadmap-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: roadmap/package-lock.json
      - run: npm ci
      - run: npm run lint
