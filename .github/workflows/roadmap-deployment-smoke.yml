name: roadmap-deployment-status

on:
  deployment_status:

permissions:
  contents: read

jobs:
  record:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment_url != '' &&
      vars.ROADMAP_DEPLOYMENT_CREATOR != '' &&
      github.event.deployment_status.creator.login == vars.ROADMAP_DEPLOYMENT_CREATOR &&
      (github.event.deployment.environment == 'Preview' ||
       github.event.deployment.environment == 'Production' ||
       github.event.deployment.environment == 'preview' ||
       github.event.deployment.environment == 'production')
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_URL: ${{ github.event.deployment_status.environment_url }}
    steps:
      - name: Record trusted Vercel deployment
        run: echo "Trusted Vercel deployment ready at $DEPLOYMENT_URL"
