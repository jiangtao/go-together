name: roadmap-quality

on:
  pull_request:
    paths:
      - "roadmap/**"
      - "docs/go-learning/daily-lessons/day-*.md"
      - ".github/workflows/roadmap-quality.yml"
      - ".vercelignore"
  push:
    branches: [main]
    paths:
      - "roadmap/**"
      - "docs/go-learning/daily-lessons/day-*.md"
      - ".github/workflows/roadmap-quality.yml"
      - ".vercelignore"

permissions:
  contents: read

concurrency:
  group: roadmap-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-and-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roadmap
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: roadmap/package-lock.json
      - run: npm ci
      - run: npm run build:release
      - run: npx playwright install --with-deps chromium
      - name: Run four-viewport E2E with attributable evidence
        env:
          E2E_CANDIDATE_HEAD: ${{ github.sha }}
          E2E_EVIDENCE_DIR: ${{ runner.temp }}/roadmap-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          E2E_RUN_ID: github-${{ github.run_id }}-${{ github.run_attempt }}
          PLAYWRIGHT_ARTIFACT_DIR: ${{ runner.temp }}/roadmap-playwright-${{ github.run_id }}-${{ github.run_attempt }}
        run: npm run test:e2e
